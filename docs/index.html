<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveTranslate · 实时中英双语字幕</title>
<meta name="description" content="Mac 本地实时中英双语字幕。麦克风实时拾音，说话即出字幕，自动互译。完全本地运行，不联网、无隐私顾虑。">
<style>
  :root{
    --jade:#2a8a7a; --jade-dark:#1f6b5e; --gold:#e8b878; --gold-soft:#f3d9b0;
    --ink:#1c2522; --muted:#5d6b66; --bg:#f7f5f0; --card:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:880px;margin:0 auto;padding:0 24px}

  /* 语言切换 */
  .lang-toggle{
    position:fixed;top:20px;right:20px;z-index:10;
    display:flex;background:var(--card);border:1px solid #e3ddd2;border-radius:999px;
    overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.06);
  }
  .lang-toggle button{
    border:none;background:transparent;cursor:pointer;
    padding:8px 16px;font-size:14px;font-weight:600;color:var(--muted);
    font-family:inherit;transition:background .15s,color .15s;
  }
  .lang-toggle button.active{background:var(--jade);color:#fff}

  header{text-align:center;padding:72px 24px 40px}
  .logo{
    width:72px;height:72px;border-radius:20px;margin:0 auto 22px;
    background:linear-gradient(135deg,var(--jade),var(--jade-dark));
    display:flex;align-items:center;justify-content:center;font-size:38px;
    box-shadow:0 10px 30px rgba(42,138,122,.28);
  }
  h1{font-size:40px;letter-spacing:-.5px;margin-bottom:14px}
  .tagline{font-size:19px;color:var(--muted);max-width:580px;margin:0 auto}
  .download-zone{padding:18px 24px 8px;text-align:center;min-height:150px}
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--jade);color:#fff;border:none;border-radius:14px;
    padding:17px 38px;font-size:18px;font-weight:600;cursor:pointer;
    text-decoration:none;transition:transform .15s,box-shadow .15s;
    box-shadow:0 8px 22px rgba(42,138,122,.3);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(42,138,122,.4)}
  .btn-sub{display:block;font-size:13px;color:var(--muted);margin-top:12px}
  .soon{
    background:var(--card);border:1.5px solid var(--gold-soft);border-radius:16px;
    padding:26px 28px;max-width:480px;margin:0 auto;text-align:left;
  }
  .soon h3{font-size:18px;margin-bottom:8px;color:var(--jade-dark)}
  .soon p{font-size:15px;color:var(--muted);margin-bottom:16px}
  .mailrow{display:flex;gap:8px}
  .mailrow input{
    flex:1;padding:12px 14px;border:1.5px solid #e3ddd2;border-radius:10px;
    font-size:15px;font-family:inherit;
  }
  .mailrow input:focus{outline:none;border-color:var(--jade)}
  .mailrow a{
    background:var(--gold);color:var(--ink);border-radius:10px;padding:12px 18px;
    font-weight:600;text-decoration:none;font-size:15px;white-space:nowrap;
    display:flex;align-items:center;
  }
  .platform-note{font-size:13px;color:var(--muted);margin-top:14px}
  .platform-note a{color:var(--jade);cursor:pointer;text-decoration:underline}

  section.feat{padding:48px 0 8px}
  .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:8px}
  .fcard{background:var(--card);border-radius:16px;padding:24px 22px;border:1px solid #eee7da}
  .fcard .ico{font-size:26px;margin-bottom:10px}
  .fcard h4{font-size:16px;margin-bottom:6px}
  .fcard p{font-size:14px;color:var(--muted)}

  section.steps{padding:48px 0}
  h2{font-size:26px;text-align:center;margin-bottom:8px}
  .h2sub{text-align:center;color:var(--muted);margin-bottom:30px;font-size:15px}
  .step{
    display:flex;gap:18px;background:var(--card);border-radius:14px;
    padding:20px 24px;margin-bottom:14px;border:1px solid #eee7da;
  }
  .step .num{
    flex:none;width:34px;height:34px;border-radius:50%;
    background:var(--jade);color:#fff;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .step h4{font-size:16px;margin-bottom:3px}
  .step p{font-size:14px;color:var(--muted)}
  .step code{background:#f0ece2;padding:1px 7px;border-radius:5px;font-size:13px}
  .callout{
    background:var(--gold-soft);border-radius:12px;padding:16px 20px;
    font-size:14px;color:#6b5326;margin-top:8px
  }
  footer{text-align:center;padding:50px 24px;color:var(--muted);font-size:13px}
  footer a{color:var(--jade);text-decoration:none;font-weight:600}
  footer a:hover{text-decoration:underline}
  @media(max-width:680px){
    h1{font-size:32px}.feat-grid{grid-template-columns:1fr}
    .mailrow{flex-direction:column}
  }
</style>
</head>
<body>
<div class="lang-toggle">
  <button id="btn-zh" onclick="setLang('zh')">中文</button>
  <button id="btn-en" onclick="setLang('en')">EN</button>
</div>

<header>
  <div class="logo">🎧</div>
  <h1>LiveTranslate</h1>
  <p class="tagline"
     data-zh="Mac 本地实时中英双语字幕。和外国同事面对面说话时，麦克风实时拾音，说话即出字幕，自动互译。"
     data-en="Real-time bilingual subtitles on your Mac. In face-to-face conversations, your mic captures speech live — subtitles appear as you speak, translated both ways."></p>
</header>

<div class="wrap">
  <div class="download-zone" id="dl"><!-- JS 按平台填充 --></div>

  <section class="feat">
    <div class="feat-grid">
      <div class="fcard"><div class="ico">⚡️</div>
        <h4 data-zh="说话即出字" data-en="Subtitles as you speak"></h4>
        <p data-zh="不用等说完一句，话音未落字幕已经在屏幕上滚动，并实时翻译。"
           data-en="No need to finish a sentence — subtitles scroll and translate while you're still talking."></p></div>
      <div class="fcard"><div class="ico">🔒</div>
        <h4 data-zh="完全本地" data-en="Fully on-device"></h4>
        <p data-zh="识别和翻译都在你自己的 Mac 上运行，不联网、不上传，无隐私顾虑。"
           data-en="Recognition and translation run entirely on your Mac — no internet, no uploads, no privacy worries."></p></div>
      <div class="fcard"><div class="ico">🇨🇳🇬🇧</div>
        <h4 data-zh="中英自动互译" data-en="Two-way ZH ⇄ EN"></h4>
        <p data-zh="你说中文显示英文，对方说英文显示中文，逐句自动切换。"
           data-en="Speak Chinese, see English; they speak English, you see Chinese — switched automatically, sentence by sentence."></p></div>
    </div>
  </section>

  <section class="steps">
    <h2 data-zh="怎么用" data-en="How to use"></h2>
    <p class="h2sub" data-zh="下载后三步就能开始，全程不需要任何技术操作"
       data-en="Three steps after download — no technical setup required"></p>

    <div class="step"><div class="num">1</div><div>
      <h4 data-zh="下载并打开" data-en="Download and open"></h4>
      <p data-zh="下载后双击解压，得到 <code>LiveTranslate</code>。<b>第一次打开</b>：右键点它 → 选「打开」→ 再点「打开」。（之后就能正常双击了）"
         data-en="Unzip and you'll get <code>LiveTranslate</code>. <b>The first time</b>: right-click it → choose “Open” → click “Open” again. (After that, just double-click.)"></p>
    </div></div>

    <div class="step"><div class="num">2</div><div>
      <h4 data-zh="允许使用麦克风" data-en="Allow microphone access"></h4>
      <p data-zh="第一次会弹出麦克风权限请求，点「允许」。这是实时拾音必需的。"
         data-en="A microphone permission prompt appears the first time — click “Allow”. It's required for live capture."></p>
    </div></div>

    <div class="step"><div class="num">3</div><div>
      <h4 data-zh="等首次准备完成，开始说话" data-en="Wait for first-time setup, then speak"></h4>
      <p data-zh="第一次启动会自动下载语音模型（约 3GB，只下这一次），字幕条会显示「正在下载模型」。下载完显示「已就绪」后，对着麦克风说话即可。"
         data-en="On first launch it downloads the speech models (about 3GB, just once); the subtitle bar shows “downloading”. Once it says “ready”, start speaking."></p>
    </div></div>

    <div class="callout"
      data-zh="💡 退出：右键点字幕条选「退出」，或直接关掉它。字幕条可以拖动到屏幕任意位置。"
      data-en="💡 To quit: right-click the subtitle bar and choose “Quit”, or just close it. You can drag the bar anywhere on screen."></div>
  </section>
</div>

<footer>
  <span data-zh="本地运行 · 不联网 · 隐私安全 &nbsp;·&nbsp; 仅支持 Apple Silicon（M 系芯片）Mac"
        data-en="On-device · Offline · Private &nbsp;·&nbsp; Apple Silicon (M-series) Mac only"></span><br>
  <span data-zh="由 " data-en="Made with 玉 by "></span><a href="https://joran.online" target="_blank" rel="noopener">JORAN 觉然</a><span data-zh=" 用玉打造" data-en=""></span>
</footer>

<script>
const APPLE_SILICON_ZIP =
  "https://github.com/cocohahaha/joran-livetranslate-download/releases/latest/download/LiveTranslate-mac-apple-silicon.zip";
const CONTACT_EMAIL = "cocofeng@digital-luxury.com";

let LANG = localStorage.getItem("lt-lang");
if(!["zh","en"].includes(LANG)){
  LANG = (navigator.language||"").toLowerCase().startsWith("zh") ? "zh" : "en";
}

const T = {
  dlBtn:   {zh:"⬇️ 下载 Mac 版（Apple Silicon）", en:"⬇️ Download for Mac (Apple Silicon)"},
  dlSub:   {zh:"适用于 M1 / M2 / M3 / M4 / M5 芯片的 Mac · 免安装，双击即用",
            en:"For Macs with M1 / M2 / M3 / M4 / M5 chips · No install, just double-click"},
  soonH:   {zh:l=>`${l} 版即将推出`, en:l=>`${l} version coming soon`},
  soonP:   {zh:l=>`目前仅支持 Apple Silicon（M 系芯片）的 Mac。${l} 版本正在开发中，留个邮箱，做好第一时间通知你。`,
            en:l=>`Currently only Apple Silicon (M-series) Macs are supported. The ${l} version is in development — leave your email and we'll let you know first.`},
  emailPH: {zh:"你的邮箱", en:"Your email"},
  notify:  {zh:"通知我", en:"Notify me"},
  macUnk:  {zh:"⚠️ 仅支持 M 系芯片的 Mac。不确定你的芯片？点苹果菜单 → 关于本机，看到「Apple M…」就能用。用的是 Intel Mac？",
            en:"⚠️ Apple Silicon (M-series) Macs only. Not sure which chip you have? Apple menu → About This Mac; if it says “Apple M…”, you're good. On an Intel Mac?"},
  macUnkLink:{zh:"点这里登记", en:"register here"},
  needAS:  {zh:"本软件需要 Apple Silicon（M 系芯片）的 Mac。", en:"This app requires an Apple Silicon (M-series) Mac."},
  mailSubject:{zh:l=>`LiveTranslate ${l} 版通知我`, en:l=>`Notify me — LiveTranslate ${l}`},
  mailBody:{zh:(l,v)=>`请在 ${l} 版发布时通知我。我的邮箱：${v}`,
            en:(l,v)=>`Please notify me when the ${l} version is released. My email: ${v}`},
};

function gpuRenderer(){
  try{
    const c=document.createElement("canvas");
    const gl=c.getContext("webgl")||c.getContext("experimental-webgl");
    if(!gl) return "";
    const ext=gl.getExtension("WEBGL_debug_renderer_info");
    return ext ? (gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)||"") : "";
  }catch(e){ return ""; }
}

function detectPlatform(){
  const ua=navigator.userAgent;
  const isMac=/Mac/.test(ua) && !/iPhone|iPad/.test(ua);
  const isWin=/Windows/.test(ua);
  if(isWin) return "windows";
  if(isMac){
    const r=gpuRenderer().toLowerCase();
    if(r.includes("apple")) return "apple-silicon";
    if(r.includes("intel")||r.includes("amd")||r.includes("radeon")) return "intel-mac";
    return "mac-unknown";
  }
  return "other";
}

function downloadHTML(){
  return `<a class="btn" href="${APPLE_SILICON_ZIP}">${T.dlBtn[LANG]}</a>
    <span class="btn-sub">${T.dlSub[LANG]}</span>`;
}
function soonHTML(label){
  return `<div class="soon">
    <h3>${T.soonH[LANG](label)}</h3>
    <p>${T.soonP[LANG](label)}</p>
    <div class="mailrow">
      <input id="email" type="email" placeholder="${T.emailPH[LANG]}">
      <a id="notify" href="#">${T.notify[LANG]}</a>
    </div></div>`;
}
function macUnknownHTML(){
  return downloadHTML() +
    `<p class="platform-note">${T.macUnk[LANG]} <a onclick="renderSoon('Intel Mac')">${T.macUnkLink[LANG]}</a></p>`;
}
function renderSoon(label){
  const el=document.getElementById("dl");
  el.innerHTML=soonHTML(label);
  document.getElementById("notify").addEventListener("click",e=>{
    e.preventDefault();
    const v=document.getElementById("email").value.trim();
    const subject=encodeURIComponent(T.mailSubject[LANG](label));
    const body=encodeURIComponent(T.mailBody[LANG](label, v));
    window.location.href=`mailto:${CONTACT_EMAIL}?subject=${subject}&body=${body}`;
  });
}

let CURRENT_VIEW = "download"; // download | soon:<label> | mac-unknown
function renderDownloadZone(){
  const el=document.getElementById("dl");
  if(CURRENT_VIEW.startsWith("soon:")) { renderSoon(CURRENT_VIEW.slice(5)); return; }
  if(CURRENT_VIEW==="mac-unknown") { el.innerHTML=macUnknownHTML(); return; }
  if(CURRENT_VIEW==="need-as") { el.innerHTML=downloadHTML()+`<p class="platform-note">${T.needAS[LANG]}</p>`; return; }
  el.innerHTML=downloadHTML();
}

function applyLang(){
  document.documentElement.lang = LANG==="zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-zh]").forEach(el=>{
    el.innerHTML = el.getAttribute("data-"+LANG);
  });
  document.getElementById("btn-zh").classList.toggle("active", LANG==="zh");
  document.getElementById("btn-en").classList.toggle("active", LANG==="en");
  renderDownloadZone();
}
function setLang(l){ LANG=l; localStorage.setItem("lt-lang", l); applyLang(); }

// 包一层 renderSoon 让语言切换后保持在 soon 视图
const _renderSoon = renderSoon;
renderSoon = function(label){ CURRENT_VIEW="soon:"+label; _renderSoon(label); };

(function init(){
  const p=detectPlatform();
  if(p==="apple-silicon") CURRENT_VIEW="download";
  else if(p==="windows") CURRENT_VIEW="soon:Windows";
  else if(p==="intel-mac") CURRENT_VIEW="soon:Intel Mac";
  else if(p==="mac-unknown") CURRENT_VIEW="mac-unknown";
  else CURRENT_VIEW="need-as";
  applyLang();
})();
</script>
</body>
</html>
